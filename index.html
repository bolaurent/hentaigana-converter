<!doctype html>
<html lang="ja">

<head>

  <meta charset="utf-8">

  <style>

    @font-face {

      font-family: "HentaiganaFont";

      src: url("./hentaigana.otf")
           format("opentype");

    }

    body {

      font-family:
        system-ui,
        sans-serif;
    }

    .inline-glyph {

      font-family:
        "HentaiganaFont",
        serif;
    }

    #output {

      font-family:
        "HentaiganaFont",
        serif;

      writing-mode:
        vertical-rl;
    }

  </style>

</head>


<body>

  <h1>
    変体仮名コンバーター
  </h1>


  <div id="status">
    loading...
  </div>


  <textarea
    id="input"
    placeholder=
    "ひらがなを入力してください"
  ></textarea>


  <br>


  <button id="rerender">
    別の字形で再表示
  </button>


  <div id="info">
    字をクリックすると
    字母が表示されます。
  </div>


  <div id="output"></div>



  <script>

    function showGlyphInfo(
      char,
      choice
    ) {

      const info =
        document.getElementById(
          "info"
        );

      info.innerHTML =
        "";

      info.append(
        `かな: ${char}　`,
        `字母: ${choice.source}　`,
        "字形: "
      );

      const glyph =
        document.createElement(
          "span"
        );

      glyph.className =
        "inline-glyph";

      glyph.textContent =
        choice.glyph;

      info.append(
        glyph,
        `　${choice.unicode}　`,
        choice.name
      );
    }

  </script>



  <script
    src="./hentaigana-map.js">
  </script>


  <script
    src="./app.js">
  </script>


</body>

</html>
