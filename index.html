<!doctype html>
<html lang="ja">

<head>

  <meta charset="utf-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <title>
    変体仮名コンバーター
  </title>


  <style>

    @font-face {

      font-family:
        "HentaiganaFont";

      src:
        url("./hentaigana.otf")
        format("opentype");
    }


    body {

      font-family:
        system-ui,
        sans-serif;

      margin:
        2rem;
    }


    h1 {

      margin-bottom:
        1rem;
    }


    textarea {

      width:
        100%;

      max-width:
        800px;

      height:
        8rem;

      font-size:
        1.5rem;

      padding:
        0.75rem;

      box-sizing:
        border-box;

      margin-top:
        1rem;
    }


    button {

      margin-top:
        1rem;

      font-size:
        1rem;

      padding:
        0.5rem 1rem;
    }


    #status {

      margin-top:
        1rem;

      font-size:
        1rem;
    }


    #info {

      margin-top:
        1rem;

      min-height:
        2rem;

      font-size:
        1.2rem;
    }


    .inline-glyph {

      font-family:
        "HentaiganaFont",
        serif;

      font-size:
        1.6em;

      vertical-align:
        middle;
    }


    #output {

      margin-top:
        2rem;

      padding:
        1rem;

      border:
        1px solid #ccc;

      background:
        #fafafa;

      font-family:
        "HentaiganaFont",
        serif;

      font-size:
        3rem;

      line-height:
        1.7;

      writing-mode:
        vertical-rl;

      text-orientation:
        upright;

      white-space:
        pre-wrap;

      width:
        420px;

      height:
        650px;

      overflow:
        auto;
    }


    .glyph {

      cursor:
        pointer;
    }


    .glyph:hover {

      background:
        #eee;
    }

  </style>

</head>


<body>

  <h1>
    変体仮名コンバーター
  </h1>


  <div id="status">
    loading...
  </div>


  <textarea
    id="input"
    placeholder=
    "ひらがなを入力してください"
  ></textarea>


  <br>


  <button id="rerender">
    別の字形で再表示
  </button>


  <div id="info">
    字をクリックすると
    字母が表示されます。
  </div>


  <div id="output"></div>



  <script>

    function showGlyphInfo(
      char,
      choice
    ) {

      const info =
        document.getElementById(
          "info"
        );

      info.innerHTML =
        "";

      info.append(
        `かな: ${char}　`,
        `字母: ${choice.source}　`,
        "字形: "
      );

      const glyph =
        document.createElement(
          "span"
        );

      glyph.className =
        "inline-glyph";

      glyph.textContent =
        choice.glyph;

      info.append(
        glyph,
        `　${choice.unicode}　`,
        choice.name
      );
    }

  </script>



  <script
    src="./hentaigana-map.js">
  </script>


  <script
    src="./app.js">
  </script>


</body>

</html>
