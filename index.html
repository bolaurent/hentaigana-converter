<!doctype html>
<html lang="ja">

<head>

  <meta charset="utf-8">

  <style>

    @font-face {

      font-family: "HentaiganaFont";

      src: url("./hentaigana.otf")
           format("opentype");

    }

    body {

      font-family:
        system-ui,
        sans-serif;
    }

	#info {

	  margin-top: 1.5rem;
	  margin-bottom: 1.5rem;

	  padding:
	    0.75rem
	    1rem;

	  max-width:
	    800px;

	  font-size:
	    1.1rem;

	  line-height:
	    1.8;

	  background:
	    #f5f5f5;

	  border-radius:
	    0.5rem;
	}



	.inline-glyph {

	  font-family:
	    "HentaiganaFont",
	    serif;

	  font-size:
	    2.5rem;

	  vertical-align:
	    middle;
	}



	#output {

	  margin-top:
	    2rem;

	  padding:
	    1.5rem;

	  border:
	    1px solid #ccc;

	  background:
	    #fafafa;

	  font-family:
	    "HentaiganaFont",
	    serif;

	  font-size:
	    5rem;

	  line-height:
	    1.3;

	  writing-mode:
	    vertical-rl;

	  text-orientation:
	    upright;

	  white-space:
	    pre-wrap;

	  width:
	    520px;

	  height:
	    750px;

	  overflow:
	    auto;
	}
  </style>

</head>


<body>

  <h1>
    変体仮名コンバーター
  </h1>


  <div id="status">
    loading...
  </div>


  <textarea
    id="input"
    placeholder=
    "ひらがなを入力してください"
  ></textarea>


  <br>


  <button id="rerender">
    別の字形で再表示
  </button>


  <div id="info">
    字をクリックすると
    字母が表示されます。
  </div>


  <div id="output"></div>



  <script>

    function showGlyphInfo(
      char,
      choice
    ) {

      const info =
        document.getElementById(
          "info"
        );

      info.innerHTML =
        "";

      info.append(
        `かな: ${char}　`,
        `字母: ${choice.source}　`,
        "字形: "
      );

      const glyph =
        document.createElement(
          "span"
        );

      glyph.className =
        "inline-glyph";

      glyph.textContent =
        choice.glyph;

      info.append(
        glyph,
        `　${choice.unicode}　`,
        choice.name
      );
    }

  </script>



  <script
    src="./hentaigana-map.js">
  </script>


  <script
    src="./app.js">
  </script>


</body>

</html>
