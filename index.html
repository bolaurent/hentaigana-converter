<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>変体仮名コンバーター</title>

  <style>
    @font-face {
      font-family: "HentaiganaFont";
      src: url("./hentaigana.otf") format("opentype");
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
    }

    textarea {
      width: 100%;
      height: 8rem;
      font-size: 1.5rem;
      padding: 0.5rem;
      margin-top: 1rem;
    }

    button {
      margin-top: 1rem;
      font-size: 1rem;
      padding: 0.5rem 1rem;
    }

    #output {
      font-family: "HentaiganaFont", serif;
      font-size: 3rem;
      line-height: 1.8;
      margin-top: 2rem;
      padding: 1rem;
      border: 1px solid #ccc;
      writing-mode: vertical-rl;
      text-orientation: upright;
      height: 600px;
      width: 420px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .glyph {
      cursor: pointer;
    }

    .glyph:hover {
      background: #eee;
    }

    #info {
      margin-top: 1rem;
      font-size: 1.2rem;
      min-height: 2rem;
    }

    #status {
      margin-top: 1rem;
    }
  </style>
</head>

<body>

  <h1>変体仮名コンバーター</h1>

  <div id="status">checking font...</div>

  <textarea id="input" placeholder="ひらがなを入力してください"></textarea>

  <br>
  <button id="rerender">別の字形で再表示</button>

  <div id="info">字をクリックすると、元のかな・字母が表示されます。</div>

  <div id="output"></div>

  <script>
    const map = {

        { glyph: "𛀂", source: "安" },

      "い": [

      ],

      ],
      "え": [
        { glyph: "𛀁", source: "衣" },
        { glyph: "𛀋", source: "盈" }
      ],
      "お": [

        { glyph: "𛀖", source: "隱" }
      ],

      "か": [

      "き": [

        { glyph: "𛀝", source: "木" }
      ],
      "く": [

        { glyph: "𛀣", source: "具" },
        { glyph: "𛀤", source: "倶" }
      ],
      "け": [
        { glyph: "𛀳", source: "介" },
        { glyph: "𛀴", source: "希" },
        { glyph: "𛀵", source: "氣" }
      ],
      "こ": [

      ],

      "さ": [

      ],
      "し": [

      ],

      ],
      "そ": [

      ],

      "た": [
        { glyph: "𛁠", source: "多" },
        { glyph: "𛁡", source: "堂" },
        { glyph: "𛁢", source: "當" }
      ],
      "ち": [
        { glyph: "𛁩", source: "千" },

      "な": [

      "ふ": [

      ],
      "へ": [

      "ま": [

      ],

      ],
      "む": [

        { glyph: "𛃙", source: "無" }
      ],
      "め": [

      ],
      "ゆ": [

      "ら": [

      ],
      "り": [

        { glyph: "𛃰", source: "梨" }
      ],
      "る": [
        { glyph: "𛃱", source: "留" },
        { glyph: "𛃲", source: "流" }
      ],
      "れ": [
        { glyph: "𛃵", source: "礼" },
        { glyph: "𛃶", source: "連" },
        { glyph: "𛃷", source: "麗" }
      ],
      "ろ": [
        { glyph: "𛃺", source: "呂" },
        { glyph: "𛃻", source: "路" }
      ],

	  "わ": [
	    { glyph: "𛄀", source: "和" },
	    { glyph: "𛄁", source: "輪" }
	  ]
      "ゐ": [
        { glyph: "𛀆", source: "井" }
      ],
      "ゑ": [
        { glyph: "𛀁", source: "惠" }
      ],
      "を": [
        { glyph: "𛃜", source: "遠" },
        { glyph: "𛃝", source: "乎" }
      ],
      "ん": [
        { glyph: "𛃻", source: "无" }
      ]
    };

    const smallKanaMap = {
      "ぁ": "あ", "ぃ": "い", "ぅ": "う", "ぇ": "え", "ぉ": "お",
      "ゃ": "や", "ゅ": "ゆ", "ょ": "よ", "っ": "つ"
    };

    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const info = document.getElementById("info");
    const status = document.getElementById("status");
    const rerenderButton = document.getElementById("rerender");

    function chooseRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function getBaseKana(char) {
      const normalized = char.normalize("NFD");
      const base = normalized[0];
      return smallKanaMap[base] || base;
    }

    function getMarks(char) {
      return char.normalize("NFD").slice(1);
    }

    function render() {
      output.innerHTML = "";

      for (const char of [...input.value]) {
        const base = getBaseKana(char);
        const marks = getMarks(char);

        if (map[base]) {
          const choice = chooseRandom(map[base]);

          const span = document.createElement("span");
          span.className = "glyph";
          span.textContent = choice.glyph + marks;
          span.dataset.kana = char;
          span.dataset.base = base;
          span.dataset.source = choice.source;
          span.dataset.glyph = choice.glyph;

          span.addEventListener("click", () => {
            info.textContent =
              `かな: ${span.dataset.kana}　字母: ${span.dataset.source}　字形: ${span.dataset.glyph}`;
          });

          output.appendChild(span);
        } else {
          output.appendChild(document.createTextNode(char));
        }
      }
    }

    input.addEventListener("input", render);
    rerenderButton.addEventListener("click", render);

    document.fonts.load("32px HentaiganaFont")
      .then(() => status.textContent = "Font loaded.")
      .catch(() => status.textContent = "Font failed to load.");
  </script>

</body>
</html>
